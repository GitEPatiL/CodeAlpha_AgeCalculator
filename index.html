<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="container">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow-lg p-4">

<h2 class="text-center mb-4">Age Calculator</h2>

<form id="ageForm" novalidate>

<div class="row g-3">

<div class="col-md-4">
<label class="form-label">Day</label>
<input type="number" class="form-control" id="day" min="1" max="31" placeholder="DD" required>
</div>

<div class="col-md-4">
<label class="form-label">Month</label>
<input type="number" class="form-control" id="month" min="1" max="12" placeholder="MM" required>
</div>

<div class="col-md-4">
<label class="form-label">Year</label>
<input type="number" class="form-control" id="year" min="1990" max="9999" placeholder="YYYY" required>
</div>

</div>

<div class="d-grid gap-2 mt-4">

<button type="submit" class="btn btn-primary">
Calculate Age
</button>

<button type="button" id="resetBtn" class="btn btn-outline-secondary">
Reset
</button>

</div>

</form>

<div id="result" class="text-center mt-4 fs-5 fw-semibold text-success" aria-live="polite"></div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
